<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AI Amran Premium</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  text-align: center;
  background: #020617;
  border-bottom: 1px solid #222;
  font-weight: bold;
}

/* CHAT */
#chat {
  height: 60vh;
  overflow-y: auto;
  padding: 20px;
}

/* MESSAGE */
.msg {
  padding: 12px 16px;
  border-radius: 12px;
  margin: 10px 0;
  max-width: 70%;
  animation: fadeIn 0.3s ease;
  white-space: pre-line;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.ai {
  background: #020617;
  border: 1px solid #333;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}

#inputArea input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

#inputArea button {
  margin-left: 10px;
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* UPLOAD */
.upload {
  margin: 15px;
  padding: 20px;
  border: 2px dashed #444;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}

.upload.dragover {
  border-color: #22c55e;
  background: rgba(34,197,94,0.1);
}

/* RESULT */
.result {
  margin: 20px;
  padding: 25px;
  background: #020617;
  border-radius: 14px;
  border: 1px solid #222;
  line-height: 1.8;
  font-size: 15px;
}

/* HEADING */
.result h2 {
  margin-top: 20px;
  font-size: 20px;
  border-bottom: 1px solid #333;
  padding-bottom: 5px;
}

.result h3 {
  margin-top: 15px;
  font-size: 16px;
  color: #22c55e;
}

/* LIST */
.result ul {
  padding-left: 20px;
}

.result li {
  margin: 6px 0;
}

/* BOLD */
.result b {
  color: #22c55e;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="header">🚀 AI Amran Premium</div>

<div id="chat"></div>

<div class="upload" id="dropZone">
  📄 Drag & Drop laporan atau klik
  <br><br>
  <input type="file" id="file">
</div>

<div id="result" class="result"></div>

<div id="inputArea">
  <input id="msg" placeholder="Tulis pesan...">
  <button onclick="send()">Kirim</button>
</div>

<script>
const API = "";

// ================= CHAT =================
async function send() {
  const text = msg.value;
  addMsg(text, "user");

  const res = await fetch(API + "/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  typeEffect(data.reply);

  msg.value = "";
}

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ================= TYPING EFFECT =================
function typeEffect(text) {
  const div = document.createElement("div");
  div.className = "msg ai";
  chat.appendChild(div);

  let i = 0;

  function typing() {
    if (i < text.length) {
      div.innerText += text.charAt(i);
      i++;
      setTimeout(typing, 10);
      chat.scrollTop = chat.scrollHeight;
    }
  }

  typing();
}

// ================= DRAG DROP =================
document.getElementById("dropZone").addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.classList.add("dragover");
});

document.getElementById("dropZone").addEventListener("dragleave", () => {
  dropZone.classList.remove("dragover");
});

document.getElementById("dropZone").addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");

  const file = e.dataTransfer.files[0];
  handleFile(file);
});

document.getElementById("file").addEventListener("change", e => {
  handleFile(e.target.files[0]);
});

// ================= UPLOAD =================
async function handleFile(file) {
  const formData = new FormData();
  formData.append("file", file);

  result.innerHTML = "⏳ Menganalisis laporan...";

  const res = await fetch(API + "/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  result.innerHTML = formatText(data.result);
}

// ================= FORMAT TEXT =================
function formatText(text) {
  let html = text;

  // Heading ##
  html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');

  // Sub heading ###
  html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');

  // Bold **
  html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

  // Bullet *
  html = html.replace(/^\* (.*$)/gim, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/gim, '<ul>$1</ul>');

  // Line break
  html = html.replace(/\n/g, "<br>");

  return html;
}
</script>

</body>
</html>
