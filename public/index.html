<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AI Amran Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* LOGIN */
#auth {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.card {
  background: #020617;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: black;
  cursor: pointer;
}

/* CHAT */
#app {
  display: none;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.msg {
  margin: 10px 0;
  max-width: 70%;
  padding: 12px;
  border-radius: 12px;
}

.user {
  background: #2563eb;
  align-self: flex-end;
}

.ai {
  background: #020617;
  border: 1px solid #333;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  background: #020617;
}

#inputArea input {
  flex: 1;
}

#uploadBox {
  border: 2px dashed #555;
  padding: 15px;
  text-align: center;
  margin: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="card">
    <h3>Login / Register</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="chat"></div>

  <div id="uploadBox">
    Upload laporan (PDF/TXT)
    <input type="file" id="file">
    <button onclick="upload()">Analisis</button>
  </div>

  <div id="inputArea">
    <input id="msg" placeholder="Tulis pesan...">
    <button onclick="send()">Kirim</button>
  </div>
</div>

<script>
const API = "";
let token = "";

// ================= LOGIN =================
async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    token = data.token;
    auth.style.display = "none";
    app.style.display = "flex";
  } else {
    alert("Login gagal");
  }
}

// ================= REGISTER =================
async function register() {
  await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  alert("Register sukses, silakan login");
}

// ================= CHAT =================
async function send() {
  const text = msg.value;
  addMsg(text, "user");

  const res = await fetch(API + "/chat", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  addMsg(data.reply, "ai");

  msg.value = "";
}

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ================= UPLOAD =================
async function upload() {
  const fileInput = document.getElementById("file");
  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  addMsg("⏳ Menganalisis laporan...", "ai");

  const res = await fetch(API + "/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  addMsg(data.result, "ai");
}
</script>

</body>
</html>
