<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>LinguaLive AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

#chatBox {
  height: 350px;
  overflow-y: auto;
  background: #020617;
  padding: 15px;
  border-radius: 10px;
}

.user { color: #38bdf8; }
.ai { color: #4ade80; }

.input-box {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.mic { background: orange; }
.send { background: green; color: white; }

</style>
</head>

<body>

<div class="container">
  <h1>🎤 LinguaLive AI</h1>

  <div id="chatBox"></div>

  <div class="input-box">
    <button class="mic" onclick="startVoice()">🎙️</button>
    <input id="message" placeholder="Ketik pesan...">
    <button class="send" onclick="sendMessage()">Kirim</button>
  </div>
</div>

<script>
function addChat(text, type) {
  const div = document.createElement("div");
  div.className = type;
  div.innerText = text;
  document.getElementById("chatBox").appendChild(div);

  const box = document.getElementById("chatBox");
  box.scrollTop = box.scrollHeight;
}

// SEND MESSAGE
async function sendMessage() {
  const input = document.getElementById("message");
  const message = input.value;

  if (!message) return;

  addChat("User: " + message, "user");
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  addChat(data.reply, "ai");
  speak(data.reply);
}

// TEXT TO SPEECH
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "id-ID";
  speech.rate = 1;
  speech.pitch = 1;
  speechSynthesis.speak(speech);
}

// VOICE INPUT
function startVoice() {
  const recognition = new webkitSpeechRecognition();
  recognition.lang = "id-ID";

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    document.getElementById("message").value = text;
    sendMessage();
  };

  recognition.start();
}
</script>

</body>
</html>
