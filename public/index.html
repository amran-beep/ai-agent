<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI Amran Premium</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .box {
      border: 2px dashed #555;
      padding: 30px;
      margin: 20px auto;
      width: 80%;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      width: 70%;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    #chatBox {
      margin-top: 20px;
      text-align: left;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

<h1>🚀 AI Amran Premium</h1>

<div class="box">
  <h3>Upload Laporan</h3>
  <input type="file" id="fileInput">
  <br>
  <button onclick="uploadFile()">Upload</button>
</div>

<div>
  <input type="text" id="message" placeholder="Tulis pesan...">
  <button onclick="sendMessage()">Kirim</button>
</div>

<div id="chatBox"></div>

<script>
const API_URL = "https://ai-agent-1-bqks.onrender.com"; // GANTI kalau domain beda

function addChat(text) {
  const div = document.createElement("div");
  div.innerText = text;
  document.getElementById("chatBox").appendChild(div);
}

// CHAT
async function sendMessage() {
  const message = document.getElementById("message").value;

  if (!message) return alert("Isi pesan dulu!");

  addChat("User: " + message);

  try {
    const res = await fetch(API_URL + "/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    addChat(data.reply);

  } catch (err) {
    addChat("Error koneksi ❌");
    console.error(err);
  }
}

// UPLOAD
async function uploadFile() {
  const fileInput = document.getElementById("fileInput");

  if (!fileInput.files[0]) {
    return alert("Pilih file dulu!");
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  addChat("Uploading file...");

  try {
    const res = await fetch(API_URL + "/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    addChat(data.reply);

  } catch (err) {
    addChat("Upload gagal ❌");
    console.error(err);
  }
}
</script>

</body>
</html>
