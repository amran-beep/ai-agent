<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI Amran Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .upload-box {
      border: 2px dashed #444;
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .chat-input {
      display: flex;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
    }

    .chat-input button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    #chatBox {
      text-align: left;
      margin-top: 20px;
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      height: 300px;
      overflow-y: auto;
    }

    .user { color: #38bdf8; }
    .ai { color: #4ade80; }
  </style>
</head>

<body>

<header>🚀 AI Amran Premium</header>

<div class="container">

  <!-- UPLOAD -->
  <div class="upload-box">
    <h3>📄 Upload Laporan</h3>
    <input type="file" id="fileInput">
    <br><br>
    <button onclick="uploadFile()">Upload</button>
  </div>

  <!-- CHAT -->
  <div class="chat-input">
    <input type="text" id="message" placeholder="Tulis pesan..." onkeypress="handleEnter(event)">
    <button onclick="sendMessage()">Kirim</button>
  </div>

  <!-- CHAT BOX -->
  <div id="chatBox"></div>

</div>

<script>
function addChat(text, type) {
  const div = document.createElement("div");
  div.className = type;
  div.innerText = text;
  document.getElementById("chatBox").appendChild(div);

  const box = document.getElementById("chatBox");
  box.scrollTop = box.scrollHeight;
}

function handleEnter(e) {
  if (e.key === "Enter") sendMessage();
}

// CHAT
async function sendMessage() {
  const input = document.getElementById("message");
  const message = input.value;

  if (!message) return alert("Isi pesan dulu!");

  addChat("User: " + message, "user");
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  addChat(data.reply, "ai");
}

// UPLOAD
async function uploadFile() {
  const fileInput = document.getElementById("fileInput");

  if (!fileInput.files[0]) {
    return alert("Pilih file dulu!");
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  const res = await fetch("/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  addChat(data.reply, "ai");
}
</script>

</body>
</html>
